<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema Escolar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand mb-0 h1">
            Sistema Escolar
        </span>
    </nav>

    <div class="container mt-3">

        <div id="alert-container"></div>

    </div>

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>Alunos</h2>

            <button class="btn btn-primary mb-3" data-bs-toggle="modal" onclick="abrirModalNovoAluno()"
                data-bs-target="#modalAluno">
                Novo Aluno
            </button>
        </div>

        <div class="card shadow-sm">

            <div class="card-body">

                <div class="table-responsive">
                    <div class="mb-3">

                        <div class="row mb-3">

                            <div class="col-md-3">

                                <input type="text" class="form-control" id="filtro-nome" placeholder="Nome">

                            </div>

                            <div class="col-md-3">

                                <input type="text" class="form-control" id="filtro-ra" placeholder="RA">

                            </div>

                            <div class="col-md-3">

                                <input type="number" class="form-control" id="filtro-ano" placeholder="Ano nascimento">

                            </div>

                            <div class="col-md-3">

                                <input type="text" class="form-control" id="filtro-turma" placeholder="Turma">

                            </div>

                        </div>
                    </div>
                       <table class="table table-striped">

                        <thead>
                            <tr>
                                <th>RA</th>
                                <th>Nome</th>
                                <th>Data Nascimento</th>
                                <th>Turma</th>
                                <th>Ações</th>
                            </tr>
                        </thead>

                        <tbody id="tabela-alunos"></tbody>

                    </table>


                   
                </div>

            </div>

        </div>

        <div class="modal fade" id="modalAluno" tabindex="-1">

            <div class="modal-dialog">

                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title" id="titulo-modal-aluno">
                            Novo Aluno
                        </h5>

                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <form id="form-aluno">

                            <input type="hidden" id="aluno_id">
                            <div class="mb-3">
                                <label class="form-label ">RA</label>

                                <input type="text" placeholder="Digite o RA" class="form-control" maxlength="14" id="ra"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Nome</label>

                                <input type="text" placeholder="Digite o nome do aluno" class="form-control" id="nome"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">
                                    Data de Nascimento
                                </label>

                                <input type="date" class="form-control" id="data_nascimento" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Turma</label>

                                <select class="form-select" id="turma_id" required>
                                    <option value="">
                                        Selecione
                                    </option>

                                    <option value="1">
                                        2A - 2026
                                    </option>

                                    <option value="2">
                                        3B - 2026
                                    </option>

                                </select>
                            </div>

                            <button type="submit" class="btn btn-success" id="btn-salvar-aluno">
                                Salvar
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>
        <div class="modal fade" id="modalArquivar" tabindex="-1">

            <div class="modal-dialog">

                <div class="modal-content">

                    <div class="modal-header">

                        <h5 class="modal-title">
                            Arquivar aluno
                        </h5>

                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

                    </div>

                    <div class="modal-body">

                        <p>
                            Deseja Excluir o aluno:
                        </p>

                        <strong id="nome-aluno-arquivar">
                        </strong>

                        <p class="mt-3 text-danger">
                            O aluno será ocultado do sistema.
                        </p>

                    </div>

                    <div class="modal-footer">

                        <button class="btn btn-secondary" data-bs-dismiss="modal">
                            Cancelar
                        </button>

                        <button class="btn btn-danger" id="btn-confirmar-arquivar">
                            Arquivar
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/aluno.js"></script>
</body>

</html>
